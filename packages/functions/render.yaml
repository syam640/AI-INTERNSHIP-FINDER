services:
  - type: web
    name: ai-internship-backend
    runtime: python
    repo: https://github.com/syam640/AI-INTERNSHIP-FINDER
    branch: main
    rootDir: packages/functions
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
